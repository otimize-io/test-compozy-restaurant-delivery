<header class="topbar">
  <a class="brand" routerLink="/consumer" aria-label="Home">
    <span class="brand-mark">🍔</span>
    <span class="brand-name">DeliveryDemo</span>
  </a>

  <nav class="role-switcher" aria-label="Role switcher">
    <span class="role-switcher__label">View as</span>
    <div class="role-switcher__group" role="group">
      @for (r of roles; track r) {
        <button
          type="button"
          class="role-chip"
          [class.role-chip--active]="role() === r"
          [attr.aria-pressed]="role() === r"
          [attr.data-role]="r"
          (click)="switchRole(r)"
        >
          {{ roleLabels[r] }}
        </button>
      }
    </div>
  </nav>

  @if (isConsumer()) {
    <a class="cart-pill" routerLink="/consumer/cart" aria-label="Open cart">
      🛒
      @if (cartCount() > 0) {
        <span class="cart-pill__count" data-testid="cart-count">{{ cartCount() }}</span>
        <span class="cart-pill__total">{{ cartTotal() | currency }}</span>
      }
    </a>
  }
</header>

<main>
  <router-outlet />
</main>
