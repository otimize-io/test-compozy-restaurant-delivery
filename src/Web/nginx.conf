# Serves the compiled Angular SPA. The app is a pure client-side bundle that calls the YARP
# gateway directly at http://localhost:8080 (apiBase in environment.ts), so nginx only needs to
# serve static files and fall back to index.html for client-side routes (deep links / refresh).
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # SPA fallback: any unmatched path returns index.html so the Angular router can handle it.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache the fingerprinted build assets (outputHashing: all in production).
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
